<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload File | File Sharing System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <header class="header">
    <h1>File Sharing System</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/upload">Upload</a>
      <a href="/access">Access</a>
    </nav>
  </header>

  <div class="main-wrapper">
    <div class="container">
      <h2>Upload File</h2>
      <p>Select a file to securely upload. You'll receive an access code once complete.</p>
      
      <form action="/upload" method="POST" enctype="multipart/form-data" onsubmit="showUploading()">
        <input type="file" name="file" required />
        <button type="submit" id="uploadBtn">Secure Upload</button>
      </form>
      
      <div id="status" class="message info" style="display:none;"></div>

      <p class="hint">
        Supported formats: JPG, PNG, PDF, ZIP, MP4<br>
        Maximum size: <strong>50 MB</strong>
      </p>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 File Sharing System | curiously developed by <strong><a href="https://sarjaninfo.me/" target="_blank">Team Drifters</a></strong></p>
    <p>Temporary & Secure File Sharing</p>
  </footer>

  <script>
    function showUploading() {
      const box = document.getElementById("status");
      const btn = document.getElementById("uploadBtn");
      
      btn.style.display = "none";
      box.style.display = "block";
      box.innerText = "Uploading file, please wait...";
    }
  </script>

</body>
</html>
