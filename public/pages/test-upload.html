<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload File | File Sharing System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <header class="header">
    <h1><a href="/" class="brand-link">Mr. Share</a></h1>
    <nav>
      <a href="/">Home</a>
      <a href="/upload">Upload</a>
      <a href="/access">Access</a>
    </nav>
  </header>

  <div class="main-wrapper">
    <div class="container">
      <h2>Upload File</h2>
      <p>Select a file to securely upload. You'll receive an access code once complete.</p>
      
      <form action="/upload" method="POST" enctype="multipart/form-data" onsubmit="showUploading()">
        <input type="file" name="file" required />
        <button type="submit" id="uploadBtn">Secure Upload</button>
      </form>
      
      <div id="status" class="message info" style="display:none;"></div>

      <p class="hint">
        Supported formats: JPG, PNG, PDF, ZIP, MP4<br>
        Maximum size: <strong>50 MB</strong>
      </p>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 File Sharing System | curiously developed by <strong><a href="https://sarjaninfo.me/" target="_blank">Team Drifters</a></strong></p>
    <p>Temporary & Secure File Sharing</p>
  </footer>

  <script>
    function showUploading() {
      const box = document.getElementById("status");
      const btn = document.getElementById("uploadBtn");
      
      btn.style.display = "none";
      box.style.display = "block";
      box.innerText = "Uploading file, please wait...";
    }
  </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const dropZone = document.querySelector('.container');
    const fileInput = document.querySelector('input[type="file"]');

    if (!dropZone || !fileInput) return;

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
    });

    dropZone.addEventListener('drop', e => {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files.length > 0) {
            fileInput.files = files;
            
            const statusLabel = dropZone.querySelector('.file-label') || dropZone.querySelector('p');
            if (statusLabel) {
                statusLabel.textContent = "Selected: " + files[0].name;
                statusLabel.style.color = "#00ffcc";
            }
        }
    }, false);
});
</script>

</body>
</html>
